name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Bongkar Zip & Cek Isi
      run: |
        unzip -q -o HabitLevel-1.zip
        echo "--- INI ISI ZIP LU YANG SEBENERNYA ---"
        ls -laR
        
    - name: Rakit APK
      run: |
        BUILD_FILE=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -1)
        
        if [ -z "$BUILD_FILE" ]; then
          echo "ERROR FATAL: File build.gradle gak ada di dalem zip lu! Lu salah nge-zip folder."
          exit 1
        fi
        
        PROJECT_DIR=$(dirname "$BUILD_FILE")
        cd "$PROJECT_DIR"
        gradle assembleDebug
        
    - name: Ambil File APK
      uses: actions/upload-artifact@v4
      with:
        name: HabitLevel-APK
        path: "**/*.apk"
