name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Ekstrak Bungkus Zip
      run: unzip HabitLevel-1.zip
      
    - name: Rakit APK
      run: |
        PROJECT_DIR=$(dirname $(find . -name gradlew | head -1))
        cd "$PROJECT_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Ambil File APK
      uses: actions/upload-artifact@v4
      with:
        name: HabitLevel-APK
        path: "**/app/build/outputs/apk/debug/app-debug.apk"
